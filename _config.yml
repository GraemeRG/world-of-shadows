title: World of Shadows
description: Project showcase and writings
url: "https://graemerg.github.io"
baseurl: "/world-of-shadows"

author: Graeme

markdown: kramdown

collections:
  posts:
    permalink: /blog/:year/:month/:day/:title/
  projects:
    output: true
    permalink: /projects/:path/

defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
  - scope:
      path: ""
      type: "projects"
    values:
      layout: "project"
  - scope:
      path: ""
    values:
      layout: "default"

plugins:
  - jekyll-feed

exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
