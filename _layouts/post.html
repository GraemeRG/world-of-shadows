---
layout: default
---
<article>
  <h1>{{ page.title }}</h1>
  <div class="entry-meta">
    {{ page.date | date: "%-d %B %Y" }}
    {% if page.tags.size > 0 %}
      &middot;
      {% for tag in page.tags %}<span class="tag">{{ tag }}</span>{% endfor %}
    {% endif %}
  </div>
  {{ content }}
</article>

<hr>
<p><a href="{{ '/blog.html' | relative_url }}">&larr; Back to all writings</a></p>
